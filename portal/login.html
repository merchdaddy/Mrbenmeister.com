<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Member Access — Gold Label Club</title>
  <link rel="stylesheet" href="/css/glc.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
    .login-bg{position:fixed;inset:0;background-image:url('https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?w=1800&q=80');background-size:cover;background-position:center;filter:brightness(.15) saturate(.5);z-index:0;}
    .login-card{position:relative;z-index:1;background:rgba(10,9,7,.97);border:1px solid var(--border);border-top:1px solid var(--gold-d);width:100%;max-width:420px;padding:3rem 2.8rem 2.5rem;border-radius:var(--radius);}
    .logo-wrap{text-align:center;margin-bottom:2rem;}
    .logo-wrap img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(201,168,76,.15));}
    .divider{width:40px;height:1px;background:linear-gradient(to right,transparent,var(--gold-d),transparent);margin:0 auto 1.8rem;}
    .error-msg{font-style:italic;font-size:.85rem;color:#e09090;text-align:center;margin-bottom:.8rem;min-height:1.2em;}
    .panel.hidden{display:none;}
    .success-note{font-style:italic;font-size:.9rem;color:var(--gold);text-align:center;margin-bottom:1rem;display:none;}
  </style>
</head>
<body>
<div class="login-bg"></div>
<div class="login-card">
  <div class="logo-wrap"><img src="/GLC%20Logo.png" alt="Gold Label Club"/></div>

  <!-- LOGIN PANEL -->
  <div class="panel" id="loginPanel">
    <p style="font-family:var(--fh);font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:.3rem">Member Access</p>
    <p style="font-style:italic;font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:1.5rem">Private — Approved Members Only</p>
    <div class="divider"></div>
    <div class="error-msg" id="loginError"></div>
    <form id="loginForm">
      <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" id="loginEmail" placeholder="your@email.com" required style="background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:.65rem .1rem"/></div>
      <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="loginPass" placeholder="••••••••" required style="background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:.65rem .1rem"/></div>
      <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:.5rem" id="loginBtn">Enter the Club</button>
    </form>
    <div style="text-align:center;margin-top:1.2rem">
      <a href="#" onclick="showPanel('resetPanel','loginPanel');return false" style="font-family:var(--fh);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)">Forgot password?</a>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:1.8rem;padding-top:1.4rem;border-top:1px solid var(--border)">
      <a href="/glc/about.html#apply" style="font-family:var(--fh);font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:#3a3530">← Request Access</a>
      <a href="/glc/index.html" style="font-family:var(--fh);font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;color:#3a3530">Gold Label Club</a>
    </div>
  </div>

  <!-- RESET PANEL -->
  <div class="panel hidden" id="resetPanel">
    <p style="font-family:var(--fh);font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);text-align:center;margin-bottom:.3rem">Reset Password</p>
    <p style="font-style:italic;font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:1.5rem">Enter your email for a reset link</p>
    <div class="divider"></div>
    <div class="error-msg" id="resetError"></div>
    <div class="success-note" id="resetSuccess">Reset link sent — check your inbox.</div>
    <form id="resetForm">
      <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" id="resetEmail" placeholder="your@email.com" required style="background:transparent;border:none;border-bottom:1px solid var(--border);border-radius:0;padding:.65rem .1rem"/></div>
      <button type="submit" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:.5rem">Send Reset Link</button>
    </form>
    <div style="text-align:center;margin-top:1.2rem">
      <a href="#" onclick="showPanel('loginPanel','resetPanel');return false" style="font-family:var(--fh);font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)">← Back to login</a>
    </div>
  </div>
</div>

<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script>
// Already logged in?
if (GLC_AUTH.isLoggedIn()) {
  window.location.href = GLC_AUTH.isAdmin() ? '/portal/admin.html' : '/portal/dashboard.html';
}

function showPanel(show, hide) {
  document.getElementById(show).classList.remove('hidden');
  document.getElementById(hide).classList.add('hidden');
}

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  document.getElementById('loginError').textContent = '';

  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;

  const { user, error } = await GLC_AUTH.login(email, pass);
  if (error || !user) {
    document.getElementById('loginError').textContent = 'Invalid email or password.';
    btn.disabled = false; btn.textContent = 'Enter the Club';
  } else {
    window.location.href = GLC_AUTH.isAdmin() ? '/portal/admin.html' : '/portal/dashboard.html';
  }
});

document.getElementById('resetForm').addEventListener('submit', e => {
  e.preventDefault();
  document.getElementById('resetSuccess').style.display = 'block';
});
</script>
</body>
</html>
