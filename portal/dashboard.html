<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Label Club — Members</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:  #060504;
      --deep:   #0e0c09;
      --panel:  #131109;
      --dark:   #1a1714;
      --gold:   #c9a84c;
      --gold-d: #7a6330;
      --cream:  #f0ead8;
      --ivory:  #c8bfad;
      --muted:  #7a7060;
      --border: #22201a;
      --active: rgba(201,168,76,0.07);
    }
    html, body { height:100%; font-family:'Cormorant Garamond',serif; background:var(--black); color:var(--cream); overflow:hidden; }

    .app { display:flex; height:100vh; }

    /* SIDEBAR */
    .sidebar { width:230px; flex-shrink:0; background:var(--deep); border-right:1px solid var(--border); display:flex; flex-direction:column; }

    .sb-logo { display:flex; flex-direction:column; align-items:center; gap:0.4rem; padding:1.8rem 1.5rem 1.5rem; border-bottom:1px solid var(--border); }
    .sb-logo img { width:55px; height:55px; object-fit:contain; }
    .sb-wordmark { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold); text-align:center; }

    .nav-item { display:flex; align-items:center; gap:0.8rem; padding:0.9rem 1.6rem; cursor:pointer; font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); border-left:2px solid transparent; transition:all 0.2s; user-select:none; }
    .nav-item:hover { color:var(--ivory); background:var(--active); }
    .nav-item.active { color:var(--gold); border-left-color:var(--gold); background:var(--active); }
    .nav-icon { font-size:0.9rem; }

    .sb-foot { margin-top:auto; padding:1.4rem 1.6rem; border-top:1px solid var(--border); }
    .sb-user { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:0.7rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .btn-logout { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.18em; text-transform:uppercase; color:#3a3530; background:none; border:none; cursor:pointer; transition:color 0.2s; padding:0; }
    .btn-logout:hover { color:var(--muted); }

    /* MAIN */
    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

    .topbar { padding:1.1rem 1.8rem; border-bottom:1px solid var(--border); background:var(--deep); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .topbar-title { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); }
    .topbar-date { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.82rem; color:var(--muted); }

    /* VIEWS */
    .view { flex:1; overflow:hidden; display:none; flex-direction:column; }
    .view.active { display:flex; }

    /* ── CHAT ── */
    .chat-messages {
      flex:1; overflow-y:auto; padding:1.5rem 2rem;
      display:flex; flex-direction:column; gap:1.1rem;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }

    .chat-intro { text-align:center; padding:2rem 1rem; font-style:italic; font-size:0.9rem; color:var(--muted); }

    .msg { display:flex; gap:0.9rem; max-width:640px; }
    .msg.own { align-self:flex-end; flex-direction:row-reverse; }

    .msg-av { width:34px; height:34px; border-radius:50%; background:var(--dark); border:1px solid var(--gold-d); display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:0.6rem; color:var(--gold); flex-shrink:0; }
    .msg-body { display:flex; flex-direction:column; gap:0.25rem; }
    .msg-meta { display:flex; align-items:baseline; gap:0.5rem; }
    .msg.own .msg-meta { flex-direction:row-reverse; }
    .msg-author { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold-d); }
    .msg-time { font-size:0.75rem; color:#3a3530; }
    .msg-bubble { background:var(--panel); border:1px solid var(--border); padding:0.7rem 1rem; font-size:0.98rem; color:var(--ivory); line-height:1.6; word-break:break-word; }
    .msg.own .msg-bubble { background:var(--dark); border-color:var(--gold-d); }

    .chat-bar { padding:1rem 1.8rem; border-top:1px solid var(--border); background:var(--deep); display:flex; gap:0.9rem; align-items:flex-end; flex-shrink:0; }
    .chat-input { flex:1; background:var(--panel); border:none; border-bottom:1px solid var(--border); color:var(--cream); font-family:'Cormorant Garamond',serif; font-size:1rem; padding:0.7rem 0.8rem; outline:none; resize:none; max-height:110px; line-height:1.5; transition:border-color 0.25s; }
    .chat-input::placeholder { color:#3a3530; font-style:italic; }
    .chat-input:focus { border-bottom-color:var(--gold); }
    .send-btn { padding:0.7rem 1.4rem; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; transition:all 0.3s; white-space:nowrap; flex-shrink:0; }
    .send-btn:hover { background:var(--gold); color:var(--black); }

    /* ── EVENTS ── */
    .events-scroll { flex:1; overflow-y:auto; padding:2rem; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .ev-header { font-family:'Cinzel',serif; font-size:0.62rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); margin-bottom:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
    .ev-empty { text-align:center; padding:4rem 2rem; font-style:italic; color:var(--muted); }

    .ev-card { background:var(--panel); border:1px solid var(--border); border-left:2px solid var(--gold-d); padding:1.6rem 1.8rem; margin-bottom:0.9rem; display:grid; grid-template-columns:72px 1fr; gap:1.4rem; transition:border-left-color 0.25s; }
    .ev-card:hover { border-left-color:var(--gold); }
    .ev-date-block { text-align:center; background:var(--dark); border:1px solid var(--border); padding:0.7rem 0.4rem; }
    .ev-mon { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); display:block; }
    .ev-day { font-family:'Cinzel',serif; font-size:1.7rem; font-weight:600; color:var(--cream); line-height:1; display:block; margin:0.15rem 0; }
    .ev-dow { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); display:block; }
    .ev-title { font-family:'Cinzel',serif; font-size:0.9rem; letter-spacing:0.1em; color:var(--cream); margin-bottom:0.45rem; }
    .ev-detail { font-style:italic; font-size:0.88rem; color:var(--muted); margin-bottom:0.2rem; }
    .ev-tag { display:inline-block; font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold-d); border:1px solid var(--border); padding:0.18rem 0.55rem; margin-top:0.5rem; }

    @media (max-width: 640px) {
      .sidebar { display:none; }
      .topbar-date { display:none; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-logo">
      <img src="../GLC%20Logo.png" alt="GLC" />
      <span class="sb-wordmark">Gold Label Club</span>
    </div>
    <div class="nav-item active" onclick="switchView('chat',this)"><span class="nav-icon">◈</span> Chat</div>
    <div class="nav-item" onclick="switchView('events',this)"><span class="nav-icon">◇</span> Events</div>
    <div class="sb-foot">
      <div class="sb-user" id="userName">Member</div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="viewTitle">Member Chat</span>
      <span class="topbar-date" id="todayDate"></span>
    </div>

    <!-- CHAT -->
    <div class="view active" id="chatView">
      <div class="chat-messages" id="chatMessages">
        <div class="chat-intro">Welcome to Gold Label Club.<br>This conversation is private to members.</div>
      </div>
      <div class="chat-bar">
        <textarea class="chat-input" id="chatInput" placeholder="Say something…" rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMsg()">Send</button>
      </div>
    </div>

    <!-- EVENTS -->
    <div class="view" id="eventsView">
      <div class="events-scroll">
        <div class="ev-header">Upcoming Events</div>
        <div id="evList"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null, profile = null;

  document.getElementById('todayDate').textContent =
    new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  // Auth guard
  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) { window.location.href = 'login.html'; return; }
    if (session.user.email === GLC_ADMIN_EMAIL) { window.location.href = 'admin.html'; return; }

    const { data: p } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
    if (!p?.approved) { await sb.auth.signOut(); window.location.href = 'login.html'; return; }

    currentUser = session.user;
    profile     = p;
    document.getElementById('userName').textContent = (p.first_name + ' ' + p.last_name).trim() || 'Member';

    loadChat();
    loadEvents();
  });

  // ── CHAT ──────────────────────────────────────────────────────────────────
  async function loadChat() {
    // Load last 80 messages
    const { data } = await sb.from('messages').select('*').order('created_at', { ascending: true }).limit(80);
    const box = document.getElementById('chatMessages');
    box.innerHTML = '';
    if (!data?.length) {
      box.innerHTML = '<div class="chat-intro">Welcome to Gold Label Club.<br>This conversation is private to members.</div>';
    } else {
      data.forEach(m => renderMsg(m, false));
      box.scrollTop = box.scrollHeight;
    }

    // Real-time subscription
    sb.channel('messages-channel')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        // Remove intro if present
        const intro = box.querySelector('.chat-intro');
        if (intro) intro.remove();
        renderMsg(payload.new, true);
      })
      .subscribe();
  }

  function renderMsg(m, scroll) {
    const box    = document.getElementById('chatMessages');
    const isOwn  = m.user_id === currentUser.id;
    const initials = (m.user_name || '?').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase();
    const time   = new Date(m.created_at).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

    const div = document.createElement('div');
    div.className = 'msg' + (isOwn ? ' own' : '');
    div.innerHTML = `
      <div class="msg-av">${initials}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-author">${esc(m.user_name)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-bubble">${esc(m.content)}</div>
      </div>`;
    box.appendChild(div);
    if (scroll) box.scrollTop = box.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = '';

    await sb.from('messages').insert({
      user_id:   currentUser.id,
      user_name: (profile.first_name + ' ' + profile.last_name).trim() || 'Member',
      content:   text
    });
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  }

  document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 110) + 'px';
  });

  // ── EVENTS ────────────────────────────────────────────────────────────────
  async function loadEvents() {
    const now = new Date().toISOString();
    const { data } = await sb.from('events').select('*').gte('event_date', now).order('event_date');
    const list = document.getElementById('evList');

    if (!data?.length) { list.innerHTML = '<div class="ev-empty">No upcoming events. Check back soon.</div>'; return; }

    list.innerHTML = '';
    data.forEach(ev => {
      const d   = new Date(ev.event_date);
      const mon = d.toLocaleString('en-US', { month:'short' }).toUpperCase();
      const day = d.getDate();
      const dow = d.toLocaleString('en-US', { weekday:'short' }).toUpperCase();
      const t   = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

      const card = document.createElement('div');
      card.className = 'ev-card';
      card.innerHTML = `
        <div class="ev-date-block">
          <span class="ev-mon">${mon}</span>
          <span class="ev-day">${day}</span>
          <span class="ev-dow">${dow}</span>
        </div>
        <div>
          <div class="ev-title">${esc(ev.title)}</div>
          <div class="ev-detail">📍 ${esc(ev.location || 'Location TBA')}</div>
          <div class="ev-detail">🕐 ${t}</div>
          ${ev.description ? `<div class="ev-detail" style="margin-top:.4rem">${esc(ev.description)}</div>` : ''}
          <span class="ev-tag">${esc(ev.type || 'Members Only')}</span>
        </div>`;
      list.appendChild(card);
    });
  }

  // ── NAV ───────────────────────────────────────────────────────────────────
  function switchView(v, el) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById(v + 'View').classList.add('active');
    el.classList.add('active');
    document.getElementById('viewTitle').textContent = v === 'chat' ? 'Member Chat' : 'Upcoming Events';
  }

  function logout() { sb.auth.signOut().then(() => window.location.href = 'login.html'); }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
