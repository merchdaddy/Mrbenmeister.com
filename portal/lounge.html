<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lounge Review — Gold Label Club</title>
  <link rel="stylesheet" href="/css/glc.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .lounge-layout{display:grid;grid-template-columns:1fr 300px;gap:2rem;align-items:start;}
    .gallery{display:grid;grid-template-columns:2fr 1fr;gap:.5rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:1.5rem;}
    .gallery-main img{width:100%;height:340px;object-fit:cover;display:block;}
    .gallery-side{display:flex;flex-direction:column;gap:.5rem;}
    .gallery-side img{width:100%;flex:1;object-fit:cover;display:block;min-height:0;}
    .score-big{font-family:var(--fh);font-size:3rem;color:var(--gold);line-height:1;}
    .feature-pill{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--fh);font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;padding:.4rem .8rem;border-radius:var(--radius);border:1px solid;}
    .feature-yes{background:rgba(45,106,79,.15);border-color:var(--green);color:#7ecca0;}
    .feature-no{background:rgba(122,40,40,.1);border-color:var(--red);color:#e09090;}
    .best-chip{display:inline-block;font-family:var(--fh);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;background:var(--s3);color:var(--gold-d);border:1px solid var(--border);padding:.35rem .8rem;border-radius:var(--radius);margin:.2rem;}
    .contact-row{display:flex;align-items:center;gap:.7rem;padding:.7rem 0;border-bottom:1px solid var(--border);}
    .contact-row:last-child{border-bottom:none;}
    .comment-bubble{background:var(--s3);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem;margin-bottom:.6rem;}
    .video-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:1.5rem;background:var(--s3);}
    .video-wrap video{width:100%;display:block;max-height:400px;background:#000;}
    .video-label{font-family:var(--fh);font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-d);padding:.6rem 1rem;border-top:1px solid var(--border);}
    .fav-btn.saved{color:var(--gold);border-color:var(--gold-d);}
    @media(max-width:900px){.lounge-layout{grid-template-columns:1fr;}.gallery{grid-template-columns:1fr;}.gallery-side{flex-direction:row;}.gallery-side img{height:90px;flex:1;}}
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:.8rem">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        <a href="/portal/lounges.html" style="color:var(--muted);font-size:.8rem"><i class="fa-solid fa-arrow-left"></i> Lounges</a>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </div>
    <div class="page-body" id="pageBody">
      <div style="text-align:center;padding:5rem;color:var(--muted)">Loading…</div>
    </div>
  </div>
</div>

<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
const user = GLC_AUTH.guard(); if (!user) throw '';
renderPortalNav('lounges');

const params = new URLSearchParams(window.location.search);
const id = params.get('id') || 'l1';
const l = GLC.getLoungeById(id) || GLC.lounges[0];

let isSaved = false;

document.title = `${l.name} — Gold Label Club`;

document.getElementById('topbarActions').innerHTML = `
  <button class="btn btn-ghost btn-sm fav-btn" id="favBtn" onclick="toggleFav()">
    <i class="fa-${isSaved?'solid':'regular'} fa-bookmark"></i> ${isSaved?'Saved':'Save'}
  </button>`;

const ratingLabels = {
  humidor:'Humidor Quality', atmosphere:'Atmosphere', chairs:'Comfort & Seating',
  service:'Service', drinks:'Bar / Drinks', food:'Food',
  cigarSelection:'Cigar Selection', ventilation:'Ventilation',
  parking:'Parking', memberFriendliness:'Luxury Feel'
};

function ratingBarRow(key, label, val) {
  if (val === 0) {
    return `<div class="rating-bar-row">
      <div class="rating-bar-label">${label}</div>
      <div style="flex:1;font-style:italic;font-size:.78rem;color:var(--dim)">Not applicable</div>
      <div class="rating-bar-val" style="color:var(--dim)">N/A</div>
    </div>`;
  }
  return `<div class="rating-bar-row">
    <div class="rating-bar-label">${label}</div>
    <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${val*10}%"></div></div>
    <div class="rating-bar-val">${val}</div>
  </div>`;
}

// Sample comments
const comments = [
  { user:'u2', text:'Excellent atmosphere — the ventilation here is among the best I\'ve encountered in the US. Highly recommend.', date:'June 2, 2026' },
  { user:'u5', text:'Visited solo on a Tuesday evening. Quiet, attentive service. The leather chairs are genuinely comfortable.', date:'June 4, 2026' },
];

document.getElementById('pageBody').innerHTML = `
  <!-- GALLERY -->
  <div class="gallery">
    <div class="gallery-main"><img src="${l.photos?.[0]||l.img}" alt="${l.name}"/></div>
    <div class="gallery-side">
      <img src="${l.photos?.[1]||l.photos?.[0]||l.img}" alt="${l.name}" style="filter:brightness(.85)"/>
      <img src="${l.photos?.[2]||l.photos?.[0]||l.img}" alt="${l.name}" style="filter:brightness(.7)"/>
    </div>
  </div>

  ${l.video ? `
  <div class="video-wrap">
    <video controls preload="metadata" poster="${l.photos?.[0]||l.img}">
      <source src="${l.video}" type="video/mp4">
      <source src="${l.video}" type="video/quicktime">
    </video>
    <div class="video-label"><i class="fa-solid fa-play"></i> &nbsp;${l.name} — Club Visit</div>
  </div>` : ''}

  <!-- HEADER -->
  <div style="margin-bottom:1.2rem">
    <div style="display:flex;gap:.5rem;margin-bottom:.5rem">
      ${l.isFeatured?'<span class="badge badge-gold">Featured</span>':''}
      <span class="badge badge-gray">${l.priceLevel}</span>
      <span class="badge badge-gray">${l.country}</span>
    </div>
    <h1 style="margin-bottom:.3rem">${l.name}</h1>
    <div style="color:var(--muted);font-size:.92rem;font-style:italic"><i class="fa-solid fa-location-dot" style="color:var(--gold-d)"></i> ${l.address}</div>
    <div style="color:var(--dim);font-size:.78rem;margin-top:.2rem">Visited: ${l.visitedDate}</div>
  </div>

  <div class="lounge-layout">
    <div>
      <!-- OVERALL -->
      <div style="background:var(--s3);border:1px solid var(--gold-d);border-radius:var(--radius);padding:1.3rem;display:flex;align-items:center;gap:1.4rem;margin-bottom:1.5rem">
        <div>
          <div class="score-big">${l.ratings.overall}</div>
          <div style="font-family:var(--fh);font-size:.5rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)">Overall Score</div>
        </div>
        <div>
          <div style="margin-bottom:.4rem">${GLC.renderStars(l.ratings.overall)}</div>
          <div style="font-size:.85rem;color:var(--muted)">Noise level: ${l.noiseLevel}</div>
          <div style="font-size:.78rem;color:var(--dim);margin-top:.2rem">Best for: ${l.bestFor.join(', ')}</div>
        </div>
      </div>

      <!-- RATINGS -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><h4>Category Ratings</h4></div>
        <div class="card-body">
          ${Object.entries(ratingLabels).map(([key,label]) => ratingBarRow(key, label, l.ratings[key]||0)).join('')}
        </div>
      </div>

      <!-- REVIEW -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><h4>Club Review</h4><span style="font-size:.75rem;color:var(--muted);font-style:italic">Gold Label Club</span></div>
        <div class="card-body"><p>${l.review}</p></div>
      </div>

      <!-- FEATURES -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><h4>Features & Amenities</h4></div>
        <div class="card-body">
          <div style="display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.2rem">
            <span class="feature-pill ${l.features.bar?'feature-yes':'feature-no'}"><i class="fa-solid fa-martini-glass-citrus"></i> Bar: ${l.features.bar?'Yes':'No'}</span>
            <span class="feature-pill ${l.features.outdoor?'feature-yes':'feature-no'}"><i class="fa-solid fa-sun"></i> Outdoor: ${l.features.outdoor?'Yes':'No'}</span>
            <span class="feature-pill ${l.features.privateLounge?'feature-yes':'feature-no'}"><i class="fa-solid fa-lock"></i> Private Room: ${l.features.privateLounge?'Yes':'No'}</span>
            <span class="feature-pill ${l.features.byo?'feature-yes':'feature-no'}"><i class="fa-solid fa-fire"></i> BYO Cigars: ${l.features.byo?'Yes':'No'}</span>
          </div>
          <div style="font-family:var(--fh);font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:.5rem">Best For</div>
          <div>${l.bestFor.map(b=>`<span class="best-chip">${b}</span>`).join('')}</div>
        </div>
      </div>

      <!-- MEMBER COMMENTS -->
      <div class="card">
        <div class="card-header"><h4>Member Comments</h4><span class="badge badge-gold" style="font-size:.44rem"><i class="fa-solid fa-lock"></i> Members Only</span></div>
        <div class="card-body">
          ${comments.map(c => {
            const m = GLC.getMemberById(c.user);
            return `<div class="comment-bubble">
              <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem">
                <img src="${m?.avatar}" style="width:26px;height:26px;border-radius:50%;object-fit:cover"/>
                <span style="font-family:var(--fh);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ivory)">${m?.name||'Member'}</span>
                <span style="font-size:.72rem;color:var(--dim)">${c.date}</span>
              </div>
              <p style="font-size:.9rem;margin:0">${c.text}</p>
            </div>`;
          }).join('')}
          <div style="display:flex;gap:.7rem;margin-top:.8rem;align-items:flex-start">
            <img src="${user.avatar}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0"/>
            <div style="flex:1">
              <textarea class="form-control" placeholder="Add a member comment…" id="commentInput" rows="2"></textarea>
              <button class="btn btn-outline btn-sm" style="margin-top:.5rem" onclick="showToast('Comment posted!')"><i class="fa-solid fa-paper-plane"></i> Post</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div>
      <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><h4>Contact & Links</h4></div>
        <div class="card-body" style="padding:.5rem 1.2rem">
          ${l.phone?`<div class="contact-row"><i class="fa-solid fa-phone" style="color:var(--gold-d);width:18px;font-size:.8rem"></i><a href="tel:${l.phone}" style="color:var(--ivory);font-size:.88rem">${l.phone}</a></div>`:''}
          ${l.website?`<div class="contact-row"><i class="fa-solid fa-globe" style="color:var(--gold-d);width:18px;font-size:.8rem"></i><a href="${l.website}" target="_blank" style="font-size:.88rem">Website</a></div>`:''}
          ${l.googleBusiness?`<div class="contact-row"><i class="fa-brands fa-google" style="color:var(--gold-d);width:18px;font-size:.8rem"></i><a href="${l.googleBusiness}" target="_blank" style="font-size:.88rem">Google Maps</a></div>`:''}
        </div>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-body">
          <div style="font-family:var(--fh);font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:.8rem">Quick Scores</div>
          ${[['humidor','Humidor'],['atmosphere','Atmosphere'],['cigarSelection','Selection'],['service','Service'],['drinks','Bar']].map(([k,lbl])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
            <span style="font-size:.82rem;color:var(--muted)">${lbl}</span>
            <span style="font-family:var(--fh);font-size:.7rem;color:var(--gold)">${l.ratings[k]||'N/A'}</span>
          </div>`).join('')}
        </div>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-body" style="text-align:center">
          <div class="score-big" style="font-size:2rem">${l.priceLevel}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${l.priceLevel==='$$$$'?'Luxury':l.priceLevel==='$$$'?'Upscale':l.priceLevel==='$$'?'Mid-range':'Budget'}</div>
        </div>
      </div>

      <button class="btn btn-ghost fav-btn" id="favBtn2" style="width:100%;justify-content:center;margin-bottom:.6rem" onclick="toggleFav()">
        <i class="fa-regular fa-bookmark"></i> Save to Favorites
      </button>
      <a href="/portal/map.html" class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:.6rem"><i class="fa-solid fa-earth-americas"></i> View on Map</a>
      <a href="/portal/lounges.html" class="btn btn-ghost" style="width:100%;justify-content:center"><i class="fa-solid fa-arrow-left"></i> All Lounges</a>
    </div>
  </div>`;

function toggleFav() {
  isSaved = !isSaved;
  showToast(isSaved ? `${l.name} saved to favorites!` : 'Removed from favorites');
  document.querySelectorAll('.fav-btn').forEach(btn => {
    btn.innerHTML = `<i class="fa-${isSaved?'solid':'regular'} fa-bookmark"></i> ${isSaved?'Saved':'Save to Favorites'}`;
    btn.classList.toggle('saved', isSaved);
  });
}
</script>
</body>
</html>
