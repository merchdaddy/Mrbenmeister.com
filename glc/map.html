<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>World Map — Gold Label Club</title>
  <link rel="stylesheet" href="/css/glc.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    #glc-map{width:100%;height:calc(100vh - var(--pub-nav-h) - 120px);min-height:500px;border-radius:var(--radius);border:1px solid var(--border);}
    .map-controls{display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;}
    .leaflet-popup-content-wrapper{background:var(--s2)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:var(--shadow-lg)!important;padding:0!important;overflow:hidden;}
    .leaflet-popup-tip{background:var(--s2)!important;}
    .leaflet-popup-content{margin:0!important;width:210px!important;}
    .mp-img{width:100%;height:110px;object-fit:cover;display:block;}
    .mp-body{padding:.8rem;}
    .mp-name{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.06em;color:#f0ead8;margin-bottom:.2rem;}
    .mp-city{font-size:.8rem;color:#8a7d65;margin-bottom:.4rem;}
    .mp-rating{color:#c9a84c;font-size:.75rem;margin-bottom:.6rem;}
    .mp-btn{display:block;text-align:center;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;background:#c9a84c;color:#070605;padding:.45rem;text-decoration:none;transition:background .2s;}
    .mp-btn:hover{background:#e8d5a3;}
    .map-legend{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:.8rem;}
    .legend-item{display:flex;align-items:center;gap:.4rem;font-family:var(--fh);font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
    .legend-dot{width:10px;height:10px;border-radius:50%;}
  </style>
</head>
<body>
<div id="pubNav"></div>
<div class="pub-mobile-menu" id="pubMobileMenu"></div>
<main class="pub-page">
  <div style="padding:1.5rem 2rem 0">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1rem">
      <div>
        <p class="eyebrow" style="margin-bottom:.3rem">Worldwide</p>
        <h2 style="font-size:1.2rem">Cigar Lounge World Map</h2>
      </div>
      <div style="font-family:var(--fh);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)" id="mapStats"></div>
    </div>

    <div class="map-controls">
      <span style="font-family:var(--fh);font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim)">Filter:</span>
      <div class="filter-chip active" onclick="filterMap('all',this)">All Lounges</div>
      <div class="filter-chip" onclick="filterMap('bar',this)">Has Bar</div>
      <div class="filter-chip" onclick="filterMap('outdoor',this)">Outdoor</div>
      <div class="filter-chip" onclick="filterMap('top',this)">Top Rated (9+)</div>
      <div class="filter-chip" onclick="filterMap('featured',this)">Featured</div>
    </div>

    <div id="glc-map"></div>

    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold);border:2px solid var(--gold)"></div>Reviewed Lounge</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7ecca0;border:2px solid var(--green)"></div>Featured Lounge</div>
    </div>
  </div>
</main>

<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
renderPublicNav('map');

document.getElementById('mapStats').innerHTML =
  `<i class="fa-solid fa-location-dot" style="color:var(--gold-d)"></i> ${GLC.lounges.length} lounges · ${new Set(GLC.lounges.map(l=>l.country)).size} countries`;

const map = L.map('glc-map',{center:[30,0],zoom:2,zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);

let markers = [];

function makeIcon(featured) {
  const c = featured ? '#7ecca0' : '#c9a84c';
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34"><path d="M13 0C5.82 0 0 5.82 0 13c0 9.1 13 21 13 21S26 22.1 26 13C26 5.82 20.18 0 13 0z" fill="${c}" opacity=".9"/><circle cx="13" cy="13" r="5" fill="#070605" opacity=".8"/><circle cx="13" cy="13" r="2.5" fill="${c}"/></svg>`,
    iconSize:[26,34],iconAnchor:[13,34],popupAnchor:[0,-36],className:''
  });
}

function addMarkers(lounges) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  lounges.forEach(l => {
    const m = L.marker([l.lat,l.lng],{icon:makeIcon(l.isFeatured)}).addTo(map);
    m.bindPopup(`
      <div class="leaflet-popup-custom">
        <img src="${l.img}" class="mp-img" alt="${l.name}"/>
        <div class="mp-body">
          <div class="mp-name">${l.name}</div>
          <div class="mp-city">${l.city}, ${l.country}</div>
          <div class="mp-rating">★ ${l.ratings.overall} / 10 &nbsp;·&nbsp; ${l.priceLevel}</div>
        </div>
        <a href="/glc/lounge.html?id=${l.id}" class="mp-btn">View Full Review →</a>
      </div>`,{maxWidth:240,minWidth:210});
    markers.push(m);
  });
}

function filterMap(type, el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  let filtered = GLC.lounges;
  if (type === 'bar')      filtered = GLC.lounges.filter(l => l.features.bar);
  if (type === 'outdoor')  filtered = GLC.lounges.filter(l => l.features.outdoor);
  if (type === 'top')      filtered = GLC.lounges.filter(l => l.ratings.overall >= 9);
  if (type === 'featured') filtered = GLC.lounges.filter(l => l.isFeatured);
  addMarkers(filtered);
}

addMarkers(GLC.lounges);
</script>
</body>
</html>
