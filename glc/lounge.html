<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Lounge Review — Gold Label Club</title>
  <link rel="stylesheet" href="/css/glc.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .lounge-layout{display:grid;grid-template-columns:1fr 300px;gap:2rem;align-items:start;}
    .gallery{display:grid;grid-template-columns:2fr 1fr;gap:.5rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:2rem;}
    .gallery-main img{width:100%;height:360px;object-fit:cover;display:block;}
    .gallery-side{display:flex;flex-direction:column;gap:.5rem;}
    .gallery-side img{width:100%;flex:1;object-fit:cover;display:block;min-height:0;}
    .score-big{font-family:var(--fh);font-size:3.5rem;color:var(--gold);line-height:1;}
    .feature-pill{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--fh);font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;padding:.4rem .8rem;border-radius:var(--radius);border:1px solid;}
    .feature-yes{background:rgba(45,106,79,.15);border-color:var(--green);color:#7ecca0;}
    .feature-no{background:rgba(122,40,40,.1);border-color:var(--red);color:#e09090;}
    .best-chip{display:inline-block;font-family:var(--fh);font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;background:var(--s3);color:var(--gold-d);border:1px solid var(--border);padding:.35rem .8rem;border-radius:var(--radius);margin:.2rem;}
    .contact-row{display:flex;align-items:center;gap:.7rem;padding:.7rem 0;border-bottom:1px solid var(--border);}
    .contact-row:last-child{border-bottom:none;}
    .members-cta{background:var(--s2);border:1px solid var(--gold-d);border-radius:var(--radius);padding:1.5rem;text-align:center;margin-top:1.2rem;}
    .video-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:1.5rem;background:var(--s3);position:relative;}
    .video-wrap video{width:100%;display:block;max-height:420px;background:#000;}
    .video-label{font-family:var(--fh);font-size:.55rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-d);padding:.6rem 1rem;border-top:1px solid var(--border);}
    @media(max-width:900px){.lounge-layout{grid-template-columns:1fr;}.gallery{grid-template-columns:1fr;}.gallery-side{flex-direction:row;}.gallery-side img{height:100px;flex:1;}}
  </style>
</head>
<body>
<div id="pubNav"></div>
<div class="pub-mobile-menu" id="pubMobileMenu"></div>
<main class="pub-page">
  <div class="pub-section">
    <div class="pub-section-inner" style="max-width:1100px" id="pageBody">
      <div style="text-align:center;padding:5rem;color:var(--muted)">Loading review…</div>
    </div>
  </div>
</main>

<footer style="background:var(--s1);border-top:1px solid var(--border);padding:2rem;text-align:center">
  <div style="font-family:var(--fh);font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim)">© 2026 Gold Label Club — <a href="/glc/lounges.html" style="color:var(--dim)">Back to Lounges</a></div>
</footer>

<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
renderPublicNav('lounges');

const params = new URLSearchParams(window.location.search);
const id = params.get('id') || 'l1';
const l = GLC.getLoungeById(id) || GLC.lounges[0];

document.title = `${l.name} — Gold Label Club`;

const ratingLabels = {
  humidor:'Humidor Quality', atmosphere:'Atmosphere', chairs:'Comfort & Seating',
  service:'Service', drinks:'Bar / Drinks', food:'Food',
  cigarSelection:'Cigar Selection', ventilation:'Ventilation',
  parking:'Parking', memberFriendliness:'Luxury Feel'
};

function ratingBarRow(key, label, val) {
  if (val === 0) {
    return `<div class="rating-bar-row">
      <div class="rating-bar-label">${label}</div>
      <div style="flex:1;font-style:italic;font-size:.78rem;color:var(--dim)">Not applicable</div>
      <div class="rating-bar-val" style="color:var(--dim)">N/A</div>
    </div>`;
  }
  return `<div class="rating-bar-row">
    <div class="rating-bar-label">${label}</div>
    <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${val*10}%"></div></div>
    <div class="rating-bar-val">${val}</div>
  </div>`;
}

document.getElementById('pageBody').innerHTML = `
  <a href="/glc/lounges.html" style="font-family:var(--fh);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:.4rem;margin-bottom:1.5rem"><i class="fa-solid fa-arrow-left"></i> All Lounges</a>

  <!-- GALLERY -->
  <div class="gallery">
    <div class="gallery-main"><img src="${l.photos[0]||l.img}" alt="${l.name}"/></div>
    <div class="gallery-side">
      <img src="${l.photos[1]||l.photos[0]||l.img}" alt="${l.name}" style="filter:brightness(.85)"/>
      <img src="${l.photos[2]||l.photos[0]||l.img}" alt="${l.name}" style="filter:brightness(.7)"/>
    </div>
  </div>

  <!-- VIDEO (if available) -->
  ${l.video ? `
  <div class="video-wrap">
    <video controls preload="metadata" poster="${l.photos[0]||l.img}">
      <source src="${l.video}" type="video/mp4">
      <source src="${l.video}" type="video/quicktime">
      Your browser does not support HTML5 video.
    </video>
    <div class="video-label"><i class="fa-solid fa-play"></i> &nbsp;${l.name} — Club Visit</div>
  </div>` : ''}

  <!-- HEADER -->
  <div style="margin-bottom:1.5rem">
    <div style="display:flex;gap:.5rem;margin-bottom:.6rem">
      ${l.isFeatured?'<span class="badge badge-gold">Featured</span>':''}
      <span class="badge badge-gray">${l.priceLevel}</span>
      <span class="badge badge-gray">${l.country}</span>
    </div>
    <h1 style="margin-bottom:.3rem">${l.name}</h1>
    <div style="color:var(--muted);font-size:.95rem;font-style:italic"><i class="fa-solid fa-location-dot" style="color:var(--gold-d)"></i> ${l.address}</div>
    <div style="color:var(--dim);font-size:.8rem;margin-top:.2rem">Visited by Gold Label Club: ${l.visitedDate}</div>
  </div>

  <div class="lounge-layout">
    <div>

      <!-- OVERALL -->
      <div style="background:var(--s3);border:1px solid var(--gold-d);border-radius:var(--radius);padding:1.4rem;display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem">
        <div>
          <div class="score-big">${l.ratings.overall}</div>
          <div style="font-family:var(--fh);font-size:.52rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)">Overall Score</div>
        </div>
        <div>
          <div style="margin-bottom:.5rem">${GLC.renderStars(l.ratings.overall)}</div>
          <div style="font-size:.88rem;color:var(--muted)">Reviewed across ${Object.keys(ratingLabels).length} categories</div>
          <div style="font-size:.78rem;color:var(--dim);margin-top:.2rem">Noise level: ${l.noiseLevel}</div>
        </div>
      </div>

      <!-- RATINGS -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><h4>Category Ratings</h4></div>
        <div class="card-body">
          ${Object.entries(ratingLabels).map(([key,label]) =>
            ratingBarRow(key, label, l.ratings[key]||0)
          ).join('')}
        </div>
      </div>

      <!-- WRITTEN REVIEW -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><h4>Gold Label Club Review</h4><span style="font-size:.78rem;color:var(--muted);font-style:italic">By invitation only — member review</span></div>
        <div class="card-body"><p>${l.review}</p></div>
      </div>

      <!-- FEATURES -->
      <div class="card" style="margin-bottom:1.5rem">
        <div class="card-header"><h4>Features & Amenities</h4></div>
        <div class="card-body">
          <div style="display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.2rem">
            <span class="feature-pill ${l.features.bar?'feature-yes':'feature-no'}"><i class="fa-solid fa-martini-glass-citrus"></i> Bar: ${l.features.bar?'Yes':'No'}</span>
            <span class="feature-pill ${l.features.outdoor?'feature-yes':'feature-no'}"><i class="fa-solid fa-sun"></i> Outdoor: ${l.features.outdoor?'Yes':'No'}</span>
            <span class="feature-pill ${l.features.privateLounge?'feature-yes':'feature-no'}"><i class="fa-solid fa-lock"></i> Private Room: ${l.features.privateLounge?'Yes':'No'}</span>
            <span class="feature-pill ${l.features.byo?'feature-yes':'feature-no'}"><i class="fa-solid fa-fire"></i> BYO Cigars: ${l.features.byo?'Yes':'No'}</span>
          </div>
          <div style="font-family:var(--fh);font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:.5rem">Best For</div>
          <div>${l.bestFor.map(b=>`<span class="best-chip">${b}</span>`).join('')}</div>
        </div>
      </div>

      <!-- MEMBERS UNLOCK -->
      <div style="background:var(--s2);border:1px solid var(--gold-d);border-radius:var(--radius);padding:1.5rem;text-align:center">
        <i class="fa-solid fa-lock" style="color:var(--gold-d);font-size:1.2rem;margin-bottom:.6rem"></i>
        <h4 style="font-size:.8rem;letter-spacing:.12em;margin-bottom:.4rem">Member Features Locked</h4>
        <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem">Members can save favorites, add personal ratings, and read member comments on this lounge.</p>
        <div style="display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap">
          <a href="/portal/login.html" class="btn btn-outline btn-sm">Member Login</a>
          <a href="/glc/about.html#apply" class="btn btn-gold btn-sm">Apply</a>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div>
      <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><h4>Contact & Links</h4></div>
        <div class="card-body" style="padding:.6rem 1.2rem">
          ${l.phone?`<div class="contact-row"><i class="fa-solid fa-phone" style="color:var(--gold-d);width:18px"></i><a href="tel:${l.phone}" style="color:var(--ivory);font-size:.88rem">${l.phone}</a></div>`:''}
          ${l.website?`<div class="contact-row"><i class="fa-solid fa-globe" style="color:var(--gold-d);width:18px"></i><a href="${l.website}" target="_blank" style="font-size:.88rem">Website</a></div>`:''}
          ${l.googleBusiness?`<div class="contact-row"><i class="fa-brands fa-google" style="color:var(--gold-d);width:18px"></i><a href="${l.googleBusiness}" target="_blank" style="font-size:.88rem">Google Maps</a></div>`:''}
        </div>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-body">
          <div style="font-family:var(--fh);font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-bottom:.9rem">Quick Scores</div>
          ${[['humidor','Humidor'],['atmosphere','Atmosphere'],['cigarSelection','Selection'],['service','Service'],['drinks','Bar']].map(([k,lbl])=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
            <span style="font-size:.82rem;color:var(--muted)">${lbl}</span>
            <span style="font-family:var(--fh);font-size:.72rem;color:var(--gold)">${l.ratings[k]||'—'}</span>
          </div>`).join('')}
        </div>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-body" style="text-align:center">
          <div class="score-big" style="font-size:2rem">${l.priceLevel}</div>
          <div style="font-size:.78rem;color:var(--muted);margin-top:.2rem">${l.priceLevel==='$$$$'?'Luxury / Premium':l.priceLevel==='$$$'?'Upscale':l.priceLevel==='$$'?'Mid-range':'Budget'}</div>
        </div>
      </div>

      <a href="/glc/map.html" class="btn btn-ghost" style="width:100%;justify-content:center;margin-bottom:.6rem"><i class="fa-solid fa-earth-americas"></i> View on Map</a>
      <a href="/glc/lounges.html" class="btn btn-ghost" style="width:100%;justify-content:center"><i class="fa-solid fa-arrow-left"></i> All Lounges</a>
    </div>
  </div>`;
</script>
</body>
</html>
