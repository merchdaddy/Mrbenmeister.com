<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Label Club — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:  #060504; --deep:#0e0c09; --panel:#131109; --dark:#1a1714;
      --gold:#c9a84c; --gold-d:#7a6330; --cream:#f0ead8; --ivory:#c8bfad;
      --muted:#7a7060; --border:#22201a;
      --green:#2d6a4f; --red:#7a2828;
    }
    html,body { height:100%; font-family:'Cormorant Garamond',serif; background:var(--black); color:var(--cream); }

    .app { display:flex; height:100vh; }

    .sidebar { width:220px; flex-shrink:0; background:var(--deep); border-right:1px solid var(--border); display:flex; flex-direction:column; }
    .sb-logo { display:flex; flex-direction:column; align-items:center; gap:0.4rem; padding:1.8rem 1.5rem 1.4rem; border-bottom:1px solid var(--border); }
    .sb-logo img { width:52px; height:52px; object-fit:contain; }
    .sb-wordmark { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); text-align:center; }
    .sb-badge { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); margin-top:0.2rem; }

    .nav-item { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1.5rem; cursor:pointer; font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); border-left:2px solid transparent; transition:all 0.2s; user-select:none; }
    .nav-item:hover { color:var(--ivory); background:rgba(201,168,76,0.05); }
    .nav-item.active { color:var(--gold); border-left-color:var(--gold); background:rgba(201,168,76,0.06); }
    .n-badge { background:var(--gold); color:var(--black); font-size:0.52rem; padding:0.1rem 0.45rem; border-radius:10px; }

    .sb-foot { margin-top:auto; padding:1.2rem 1.5rem; border-top:1px solid var(--border); }
    .btn-logout { font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.18em; text-transform:uppercase; color:#3a3530; background:none; border:none; cursor:pointer; transition:color 0.2s; }
    .btn-logout:hover { color:var(--muted); }

    .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .topbar { padding:1.1rem 1.8rem; border-bottom:1px solid var(--border); background:var(--deep); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .topbar-title { font-family:'Cinzel',serif; font-size:0.7rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); }

    .view { flex:1; overflow-y:auto; padding:1.8rem 2rem; display:none; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .view.active { display:block; }

    .sec-label { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); margin-bottom:1.3rem; padding-bottom:0.9rem; border-bottom:1px solid var(--border); }

    /* APPLICATION CARDS */
    .app-card { background:var(--panel); border:1px solid var(--border); padding:1.6rem 1.8rem; margin-bottom:0.9rem; display:grid; grid-template-columns:1fr auto; gap:1.5rem; align-items:start; }
    .app-name { font-family:'Cinzel',serif; font-size:0.88rem; letter-spacing:0.1em; color:var(--cream); margin-bottom:0.4rem; }
    .app-f { font-size:0.88rem; color:var(--muted); margin-bottom:0.2rem; }
    .app-f strong { color:var(--ivory); font-weight:normal; }
    .app-f a { color:var(--gold-d); text-decoration:none; }
    .app-f a:hover { color:var(--gold); }
    .pill { display:inline-block; font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:0.2em; text-transform:uppercase; padding:0.18rem 0.6rem; margin-bottom:0.5rem; }
    .pill.pending  { background:rgba(201,168,76,0.12); color:var(--gold); }
    .pill.approved { background:rgba(45,106,79,0.2); color:#7ecb9e; }
    .pill.rejected { background:rgba(122,40,40,0.2); color:#e08080; }
    .app-actions { display:flex; flex-direction:column; gap:0.5rem; }
    .btn-app { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.18em; text-transform:uppercase; padding:0.55rem 1.1rem; border:none; cursor:pointer; transition:opacity 0.2s; white-space:nowrap; }
    .btn-approve { background:var(--green); color:#c8f0d8; }
    .btn-reject  { background:var(--red);   color:#f0c8c8; }
    .btn-app:hover { opacity:0.8; }
    .btn-app:disabled { opacity:0.4; cursor:not-allowed; }

    /* EVENT FORM */
    .ev-form { background:var(--panel); border:1px solid var(--border); border-top:1px solid var(--gold-d); padding:1.8rem; margin-bottom:2rem; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1.1rem; }
    .form-group { display:flex; flex-direction:column; gap:0.38rem; margin-bottom:1.1rem; }
    label { font-family:'Cinzel',serif; font-size:0.55rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold-d); }
    input, select, textarea { background:transparent; border:none; border-bottom:1px solid var(--border); color:var(--cream); font-family:'Cormorant Garamond',serif; font-size:0.98rem; padding:0.55rem 0.1rem; outline:none; width:100%; transition:border-color 0.25s; -webkit-appearance:none; }
    input::placeholder, textarea::placeholder { color:#3a3530; font-style:italic; }
    input:focus, select:focus, textarea:focus { border-bottom-color:var(--gold); }
    select { cursor:pointer; color:var(--cream); }
    select option { background:#1a1714; }
    textarea { resize:vertical; min-height:65px; }
    .btn-add { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.28em; text-transform:uppercase; padding:0.8rem 1.8rem; background:transparent; border:1px solid var(--gold); color:var(--gold); cursor:pointer; transition:all 0.3s; }
    .btn-add:hover { background:var(--gold); color:var(--black); }

    /* EVENT LIST */
    .ev-row { background:var(--panel); border:1px solid var(--border); border-left:2px solid var(--gold-d); padding:1.1rem 1.4rem; margin-bottom:0.7rem; display:flex; justify-content:space-between; align-items:center; }
    .ev-row-title { font-family:'Cinzel',serif; font-size:0.78rem; letter-spacing:0.08em; color:var(--cream); }
    .ev-row-date  { font-style:italic; font-size:0.82rem; color:var(--muted); margin-top:0.15rem; }
    .btn-del { font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:0.15em; text-transform:uppercase; background:none; border:1px solid #3a3530; color:#5a4a40; padding:0.3rem 0.7rem; cursor:pointer; transition:all 0.2s; }
    .btn-del:hover { border-color:var(--red); color:#e08080; }

    /* MEMBERS */
    .member-row { background:var(--panel); border:1px solid var(--border); padding:1.1rem 1.4rem; margin-bottom:0.6rem; display:flex; justify-content:space-between; align-items:center; }
    .member-name  { font-family:'Cinzel',serif; font-size:0.78rem; letter-spacing:0.08em; color:var(--cream); }
    .member-email { font-style:italic; font-size:0.82rem; color:var(--muted); }

    .empty { text-align:center; padding:3rem; font-style:italic; color:var(--muted); }

    /* TOAST */
    .toast { position:fixed; bottom:1.8rem; right:1.8rem; background:var(--panel); border:1px solid var(--gold-d); color:var(--gold); font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; padding:0.9rem 1.4rem; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
    .toast.show { opacity:1; }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-logo">
      <img src="../GLC%20Logo.png" alt="GLC" />
      <span class="sb-wordmark">Gold Label Club</span>
      <span class="sb-badge">Admin</span>
    </div>
    <div class="nav-item active" onclick="switchView('applications',this)">
      Applications <span class="n-badge" id="pendingBadge" style="display:none">0</span>
    </div>
    <div class="nav-item" onclick="switchView('events',this)">Events</div>
    <div class="nav-item" onclick="switchView('members',this)">Members</div>
    <div class="sb-foot">
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="viewTitle">Applications</span>
    </div>

    <!-- APPLICATIONS -->
    <div class="view active" id="applicationsView">
      <div class="sec-label">Pending</div>
      <div id="pendingList"><div class="empty">No pending applications.</div></div>
      <div class="sec-label" style="margin-top:2rem">All Applications</div>
      <div id="allList"><div class="empty">No applications yet.</div></div>
    </div>

    <!-- EVENTS -->
    <div class="view" id="eventsView">
      <div class="sec-label">Add Event</div>
      <div class="ev-form">
        <div class="form-row">
          <div class="form-group"><label>Title</label><input type="text" id="evTitle" placeholder="e.g. Monthly Smoke Evening" /></div>
          <div class="form-group"><label>Type</label>
            <select id="evType">
              <option>Members Only</option><option>Gold Label Tier</option>
              <option>All Tiers</option><option>Invitation Only</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date & Time</label><input type="datetime-local" id="evDate" /></div>
          <div class="form-group"><label>Location</label><input type="text" id="evLoc" placeholder="Venue, City" /></div>
        </div>
        <div class="form-group"><label>Description (optional)</label><textarea id="evDesc" placeholder="Details for members…"></textarea></div>
        <button class="btn-add" onclick="addEvent()">Add Event</button>
      </div>
      <div class="sec-label">Upcoming Events</div>
      <div id="adminEvList"><div class="empty">No events yet.</div></div>
    </div>

    <!-- MEMBERS -->
    <div class="view" id="membersView">
      <div class="sec-label">Approved Members</div>
      <div id="membersList"><div class="empty">No members yet.</div></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script src="../supabase-admin-config.js"></script>
<script>
  const { createClient } = supabase;
  // Public client for reads
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  // Admin client for inviting users (uses service role key)
  const sbAdmin = createClient(SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, {
    auth: { autoRefreshToken: false, persistSession: false }
  });

  // Auth guard — admin only
  sb.auth.getSession().then(({ data: { session } }) => {
    if (!session) { window.location.href = 'login.html'; return; }
    if (session.user.email !== GLC_ADMIN_EMAIL) { window.location.href = 'dashboard.html'; return; }
    loadApplications();
    loadAdminEvents();
    loadMembers();
  });

  // ── APPLICATIONS ──────────────────────────────────────────────────────────
  async function loadApplications() {
    const { data } = await sbAdmin.from('applications').select('*').order('submitted_at', { ascending: false });
    if (!data) return;

    const pending = data.filter(d => d.status === 'pending');
    const badge   = document.getElementById('pendingBadge');
    badge.style.display = pending.length ? 'inline-block' : 'none';
    badge.textContent   = pending.length;

    document.getElementById('pendingList').innerHTML =
      pending.length ? pending.map(renderApp).join('') : '<div class="empty">No pending applications.</div>';
    document.getElementById('allList').innerHTML =
      data.length ? data.map(renderApp).join('') : '<div class="empty">No applications yet.</div>';
  }

  function renderApp(d) {
    const date = d.submitted_at
      ? new Date(d.submitted_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      : '';
    return `
      <div class="app-card" id="ac-${d.id}">
        <div>
          <span class="pill ${d.status}">${d.status}</span>
          <div class="app-name">${esc(d.first_name)} ${esc(d.last_name)}</div>
          <div class="app-f">✉ <strong>${esc(d.email)}</strong></div>
          <div class="app-f">📞 <strong>${esc(d.phone||'—')}</strong></div>
          <div class="app-f">📍 <strong>${esc(d.city||'—')}</strong></div>
          <div class="app-f">💼 <strong>${esc(d.occupation||'—')}</strong></div>
          ${d.linkedin ? `<div class="app-f">🔗 <a href="${esc(d.linkedin)}" target="_blank">LinkedIn</a></div>` : ''}
          <div class="app-f" style="margin-top:.6rem;font-size:.78rem;color:#3a3530">${date}</div>
        </div>
        <div class="app-actions">
          ${d.status === 'pending' ? `
            <button class="btn-app btn-approve" onclick="approveApp('${d.id}','${esc(d.email)}','${esc(d.first_name)}','${esc(d.last_name)}')">✓ Approve</button>
            <button class="btn-app btn-reject"  onclick="rejectApp('${d.id}')">✕ Decline</button>
          ` : `<span style="font-family:'Cinzel',serif;font-size:.55rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase">${d.status}</span>`}
        </div>
      </div>`;
  }

  async function approveApp(id, email, firstName, lastName) {
    const btn = document.querySelector(`#ac-${id} .btn-approve`);
    if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

    try {
      // 1. Invite user — Supabase sends them an email with a magic link to set their password
      const { data: inviteData, error: inviteErr } = await sbAdmin.auth.admin.inviteUserByEmail(email, {
        data: { first_name: firstName, last_name: lastName }
      });
      if (inviteErr) throw inviteErr;

      // 2. Create profile record
      await sbAdmin.from('profiles').upsert({
        id:         inviteData.user.id,
        first_name: firstName,
        last_name:  lastName,
        email:      email,
        approved:   true
      });

      // 3. Mark application approved
      await sbAdmin.from('applications').update({ status: 'approved' }).eq('id', id);

      showToast('Approved — invite sent to ' + email);
      loadApplications();
    } catch (err) {
      showToast('Error: ' + (err.message || 'Something went wrong'));
      if (btn) { btn.disabled = false; btn.textContent = '✓ Approve'; }
    }
  }

  async function rejectApp(id) {
    if (!confirm('Decline this application?')) return;
    await sbAdmin.from('applications').update({ status: 'rejected' }).eq('id', id);
    showToast('Application declined.');
    loadApplications();
  }

  // ── EVENTS ────────────────────────────────────────────────────────────────
  async function loadAdminEvents() {
    const { data } = await sbAdmin.from('events').select('*').order('event_date');
    const el = document.getElementById('adminEvList');
    if (!data?.length) { el.innerHTML = '<div class="empty">No events yet.</div>'; return; }

    el.innerHTML = '';
    data.forEach(ev => {
      const d = new Date(ev.event_date);
      const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'long', day:'numeric', year:'numeric' })
        + ' · ' + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      const row = document.createElement('div');
      row.className = 'ev-row';
      row.innerHTML = `
        <div>
          <div class="ev-row-title">${esc(ev.title)}</div>
          <div class="ev-row-date">${dateStr} — ${esc(ev.location||'Location TBA')}</div>
        </div>
        <button class="btn-del" onclick="deleteEvent('${ev.id}')">Delete</button>`;
      el.appendChild(row);
    });
  }

  async function addEvent() {
    const title = document.getElementById('evTitle').value.trim();
    const date  = document.getElementById('evDate').value;
    if (!title || !date) { showToast('Title and date required.'); return; }

    const { error } = await sbAdmin.from('events').insert({
      title,
      event_date:  new Date(date).toISOString(),
      location:    document.getElementById('evLoc').value.trim(),
      description: document.getElementById('evDesc').value.trim(),
      type:        document.getElementById('evType').value
    });

    if (error) { showToast('Error: ' + error.message); return; }
    ['evTitle','evDate','evLoc','evDesc'].forEach(id => document.getElementById(id).value = '');
    showToast('Event added.');
    loadAdminEvents();
  }

  async function deleteEvent(id) {
    if (!confirm('Delete this event?')) return;
    await sbAdmin.from('events').delete().eq('id', id);
    showToast('Event deleted.');
    loadAdminEvents();
  }

  // ── MEMBERS ───────────────────────────────────────────────────────────────
  async function loadMembers() {
    const { data } = await sbAdmin.from('profiles').select('*').eq('approved', true).order('joined_at', { ascending: false });
    const el = document.getElementById('membersList');
    if (!data?.length) { el.innerHTML = '<div class="empty">No approved members yet.</div>'; return; }

    el.innerHTML = '';
    data.forEach(m => {
      const row = document.createElement('div');
      row.className = 'member-row';
      row.innerHTML = `
        <div>
          <div class="member-name">${esc(m.first_name)} ${esc(m.last_name)}</div>
          <div class="member-email">${esc(m.email)}</div>
        </div>`;
      el.appendChild(row);
    });
  }

  // ── HELPERS ───────────────────────────────────────────────────────────────
  function switchView(v, el) {
    document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
    document.getElementById(v + 'View').classList.add('active');
    el.classList.add('active');
    document.getElementById('viewTitle').textContent = { applications:'Applications', events:'Events', members:'Members' }[v];
  }

  function logout() { sb.auth.signOut().then(() => window.location.href = 'login.html'); }

  let toastT;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove('show'), 3500);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
