<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Members — Gold Label Club</title>
  <link rel="stylesheet" href="/css/glc.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;}
    .member-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;text-align:center;transition:border-color .2s;}
    .member-card:hover{border-color:var(--gold-d);}
    .member-av{width:68px;height:68px;border-radius:50%;border:2px solid var(--gold-d);object-fit:cover;margin:0 auto .8rem;}
    .member-name{font-family:var(--fh);font-size:.82rem;letter-spacing:.08em;color:var(--cream);margin-bottom:.2rem;}
    .member-city{font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:.5rem;}
    .member-since{font-family:var(--fh);font-size:.46rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
    .member-list-row{display:flex;align-items:center;gap:1rem;padding:.9rem 1.2rem;background:var(--s2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;transition:border-color .2s;}
    .member-list-row:hover{border-color:var(--border2);}
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:.8rem">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        <span class="topbar-title">Members</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="memberSearch" placeholder="Search members…" oninput="renderMembers()"/></div>
      </div>
    </div>
    <div class="page-body">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.8rem">
        <div>
          <h2 style="font-size:1.1rem;margin-bottom:.2rem">The Circle</h2>
          <div style="font-size:.82rem;color:var(--muted)" id="memberCount"></div>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
          <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
          <div class="filter-chip" onclick="setFilter('admin',this)">Admins</div>
          <div class="filter-chip" onclick="setFilter('member',this)">Members</div>
          <button class="topbar-btn" id="gridBtn" onclick="setView('grid')" title="Grid view"><i class="fa-solid fa-grid-2"></i></button>
          <button class="topbar-btn" id="listBtn" onclick="setView('list')" title="List view"><i class="fa-solid fa-list"></i></button>
        </div>
      </div>
      <div id="membersContainer"></div>
    </div>
  </div>
</div>
<script src="/js/data.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/nav.js"></script>
<script>
const user = GLC_AUTH.guard(); if(!user) throw '';
renderPortalNav('members');

let viewMode='grid',roleFilter='all';

function getEventCount(id){return GLC.events.filter(e=>e.rsvps.going.includes(id)||e.rsvps.interested.includes(id)).length;}

function setFilter(f,el){roleFilter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderMembers();}
function setView(v){viewMode=v;renderMembers();}

function renderMembers(){
  const search=document.getElementById('memberSearch').value.toLowerCase();
  const members=GLC.members.filter(m=>{
    if(roleFilter!=='all'&&m.role!==roleFilter) return false;
    if(search&&!m.name.toLowerCase().includes(search)&&!m.city.toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('memberCount').textContent=`${members.length} member${members.length!==1?'s':''} in the club`;

  if(viewMode==='grid'){
    document.getElementById('membersContainer').innerHTML=`<div class="member-grid">${members.map(m=>`
    <div class="member-card">
      <img src="${m.avatar}" class="member-av" alt="${m.name}"/>
      ${m.role==='admin'?'<div style="margin-bottom:.4rem"><span class="badge badge-gold" style="font-size:.42rem">Admin</span></div>':''}
      <div class="member-name">${m.name}</div>
      <div class="member-city"><i class="fa-solid fa-location-dot" style="color:var(--gold-d);font-size:.7rem"></i> ${m.city}</div>
      <div class="member-since">Member since ${m.memberSince}</div>
      <div style="display:flex;gap:.5rem;justify-content:center;margin-top:.8rem">
        <button class="btn btn-ghost btn-sm" onclick="showToast('Message sent to ${m.name}!')" style="font-size:.48rem"><i class="fa-solid fa-message"></i></button>
        <a href="/portal/messages.html" class="btn btn-outline btn-sm" style="font-size:.48rem">Connect</a>
      </div>
    </div>`).join('')}</div>`;
  } else {
    document.getElementById('membersContainer').innerHTML=members.map(m=>`
    <div class="member-list-row">
      <img src="${m.avatar}" style="width:42px;height:42px;border-radius:50%;border:1.5px solid var(--gold-d);object-fit:cover;flex-shrink:0"/>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:.5rem">
          <span style="font-family:var(--fh);font-size:.75rem;letter-spacing:.06em;color:var(--cream)">${m.name}</span>
          ${m.role==='admin'?'<span class="badge badge-gold" style="font-size:.42rem">Admin</span>':''}
        </div>
        <div style="font-size:.8rem;color:var(--muted);font-style:italic">${m.city}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--fh);font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)">${getEventCount(m.id)} events</div>
        <div style="font-size:.72rem;color:var(--dim);margin-top:.1rem">Since ${m.memberSince}</div>
      </div>
      <a href="/portal/messages.html" class="btn btn-ghost btn-sm" style="font-size:.5rem;flex-shrink:0"><i class="fa-solid fa-message"></i></a>
    </div>`).join('');
  }
}

renderMembers();
</script>
</body>
</html>
