<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gold Label Club — World Map</title>
  <link rel="stylesheet" href="css/glc.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    #glc-map { width:100%; height:calc(100vh - 56px - 3rem); border-radius:var(--radius); border:1px solid var(--border); }
    .leaflet-popup-content-wrapper { background:var(--surface2)!important; border:1px solid var(--border)!important; border-radius:var(--radius)!important; box-shadow:var(--shadow)!important; padding:0!important; overflow:hidden; }
    .leaflet-popup-tip { background:var(--surface2)!important; }
    .leaflet-popup-content { margin:0!important; width:220px!important; }
    .map-popup img { width:100%;height:110px;object-fit:cover;display:block; }
    .map-popup-body { padding:0.8rem; }
    .map-popup-name { font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.06em;color:#f0ead8;margin-bottom:0.2rem; }
    .map-popup-city { font-size:0.8rem;color:#8a7d65;margin-bottom:0.4rem; }
    .map-popup-rating { color:#c9a84c;font-size:0.75rem;margin-bottom:0.7rem; }
    .map-popup-btn { display:block;text-align:center;font-family:'Cinzel',serif;font-size:0.52rem;letter-spacing:0.2em;text-transform:uppercase;background:#c9a84c;color:#070605;padding:0.45rem;text-decoration:none;transition:background 0.2s; }
    .map-popup-btn:hover { background:#e8d5a3; }
    .map-legend { position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(11,10,8,0.95);border:1px solid var(--border);border-radius:var(--radius);padding:0.7rem 1.2rem;display:flex;gap:1.5rem;backdrop-filter:blur(6px); }
    .map-legend-item { display:flex;align-items:center;gap:0.4rem;font-family:var(--font-h);font-size:0.52rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted); }
    .map-legend-dot { width:10px;height:10px;border-radius:50%;border:2px solid; }
    .map-stat-bar { display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:0.8rem">
        <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
        <span class="topbar-title">World Map</span>
      </div>
      <div class="topbar-right">
        <span id="mapStats" style="font-family:var(--font-h);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)"></span>
      </div>
    </div>
    <div class="page-body" style="padding:1rem">
      <div style="position:relative">
        <div id="glc-map"></div>
        <div class="map-legend">
          <div class="map-legend-item"><div class="map-legend-dot" style="background:var(--gold-d);border-color:var(--gold)"></div>Reviewed Lounge</div>
          <div class="map-legend-item"><div class="map-legend-dot" style="background:rgba(45,106,79,0.5);border-color:var(--green)"></div>Featured</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="js/data.js"></script>
<script src="js/nav.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
renderNav('map');

document.getElementById('mapStats').innerHTML = `<i class="fa-solid fa-location-dot" style="color:var(--gold-d)"></i> ${GLC.lounges.length} lounges across ${new Set(GLC.lounges.map(l=>l.country)).size} countries`;

// Init map with dark tile layer
const map = L.map('glc-map', {
  center: [30, 0],
  zoom: 2,
  zoomControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

// Custom gold pin icon
function makeIcon(featured) {
  const color = featured ? '#7ecca0' : '#c9a84c';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.75 14 22 14 22S28 23.75 28 14C28 6.27 21.73 0 14 0z" fill="${color}" opacity="0.9"/>
    <circle cx="14" cy="14" r="6" fill="#070605" opacity="0.8"/>
    <circle cx="14" cy="14" r="3" fill="${color}"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [28,36],
    iconAnchor: [14,36],
    popupAnchor: [0,-36],
    className: ''
  });
}

// Add pins
GLC.lounges.forEach(l => {
  const icon = makeIcon(l.isFeatured);
  const marker = L.marker([l.lat, l.lng], { icon }).addTo(map);

  const popup = `
    <div class="map-popup">
      <img src="${l.img}" alt="${l.name}" />
      <div class="map-popup-body">
        <div class="map-popup-name">${l.name}</div>
        <div class="map-popup-city">${l.city}, ${l.country}</div>
        <div class="map-popup-rating">★ ${l.ratings.overall} / 10</div>
      </div>
      <a href="lounge.html?id=${l.id}" class="map-popup-btn">View Full Review →</a>
    </div>`;

  marker.bindPopup(popup, { maxWidth: 240, minWidth: 220 });
});
</script>
</body>
</html>
